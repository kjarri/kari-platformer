<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="groundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d6a4f"/>
      <stop offset="100%" style="stop-color:#1b4332"/>
    </linearGradient>
    <linearGradient id="playerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e63946"/>
      <stop offset="100%" style="stop-color:#d62828"/>
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ffaa00"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="url(#skyGradient)"/>
  
  <!-- Stars -->
  <circle cx="50" cy="60" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="120" cy="90" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="200" cy="45" r="2" fill="#fff" opacity="0.9"/>
  <circle cx="280" cy="80" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="350" cy="55" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="420" cy="70" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="470" cy="40" r="1" fill="#fff" opacity="0.9"/>
  <circle cx="80" cy="120" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="450" cy="110" r="1.5" fill="#fff" opacity="0.7"/>
  
  <!-- Moon -->
  <circle cx="420" cy="90" r="35" fill="#f5f5dc" opacity="0.9"/>
  <circle cx="410" cy="85" r="30" fill="url(#skyGradient)"/>
  
  <!-- Ground Hills -->
  <path d="M0 420 Q80 380 160 420 Q240 460 320 420 Q400 380 512 420 L512 512 L0 512 Z" fill="url(#groundGradient)"/>
  <path d="M0 450 Q100 420 200 450 Q300 480 400 450 Q480 420 512 450 L512 512 L0 512 Z" fill="#1b4332" opacity="0.7"/>
  
  <!-- Small Platform -->
  <rect x="60" y="340" width="80" height="20" rx="5" fill="#40916c" filter="url(#shadow)"/>
  <rect x="60" y="340" width="80" height="6" rx="3" fill="#52b788"/>
  
  <!-- Floating Platform -->
  <rect x="380" y="280" width="70" height="18" rx="4" fill="#40916c" filter="url(#shadow)"/>
  <rect x="380" y="280" width="70" height="5" rx="2" fill="#52b788"/>
  
  <!-- Coin 1 -->
  <g filter="url(#glow)">
    <circle cx="100" cy="310" r="12" fill="url(#goldGradient)"/>
    <circle cx="100" cy="310" r="8" fill="#ffd700"/>
    <text x="100" y="314" text-anchor="middle" font-size="10" font-weight="bold" fill="#b8860b">$</text>
  </g>
  
  <!-- Coin 2 -->
  <g filter="url(#glow)">
    <circle cx="415" cy="250" r="10" fill="url(#goldGradient)"/>
    <circle cx="415" cy="250" r="6" fill="#ffd700"/>
  </g>
  
  <!-- Player Character - Jumping Pose -->
  <g filter="url(#shadow)">
    <!-- Body -->
    <rect x="225" y="240" width="50" height="60" rx="8" fill="url(#playerGradient)"/>
    
    <!-- Face -->
    <rect x="235" y="255" width="30" height="25" rx="5" fill="#ffd6a5"/>
    
    <!-- Eyes -->
    <rect x="242" y="262" width="6" height="8" rx="2" fill="#1d3557"/>
    <rect x="252" y="262" width="6" height="8" rx="2" fill="#1d3557"/>
    <circle cx="244" cy="264" r="2" fill="#fff"/>
    <circle cx="254" cy="264" r="2" fill="#fff"/>
    
    <!-- Legs (jumping) -->
    <rect x="230" y="295" width="18" height="25" rx="4" fill="#1d3557"/>
    <rect x="252" y="295" width="18" height="25" rx="4" fill="#1d3557"/>
    
    <!-- Arms (outstretched) -->
    <rect x="195" y="255" width="30" height="12" rx="4" fill="#e63946"/>
    <rect x="275" y="255" width="30" height="12" rx="4" fill="#e63946"/>
    
    <!-- Gun -->
    <rect x="305" y="265" width="20" height="10" rx="2" fill="#333"/>
    <rect x="320" y="267" width="8" height="6" rx="1" fill="#555"/>
    
    <!-- Speed lines -->
    <line x1="190" y1="260" x2="210" y2="260" stroke="#ffaa00" stroke-width="2" opacity="0.8"/>
    <line x1="185" y1="270" x2="205" y2="270" stroke="#ffaa00" stroke-width="2" opacity="0.6"/>
    <line x1="190" y1="280" x2="210" y2="280" stroke="#ffaa00" stroke-width="2" opacity="0.7"/>
  </g>
  
  <!-- Text: HOPPA -->
  <text x="256" y="420" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" font-weight="bold" fill="#f8f9fa" filter="url(#shadow)">HOPPA</text>
  <text x="256" y="420" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" font-weight="bold" fill="none" stroke="#e63946" stroke-width="1">HOPPA</text>
  
  <!-- Subtitle -->
  <text x="256" y="450" text-anchor="middle" font-family="'Courier New', monospace" font-size="16" fill="#adb5bd" letter-spacing="4">PLATFORMER</text>
  
  <!-- Arrow hint -->
  <g opacity="0.8">
    <polygon points="256,470 246 266,480,480" fill="#52b788"/>
  </g>
</svg>