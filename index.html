<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platformer Leikur</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        .game-container {
            text-align: center;
            position: relative;
        }
        #debugToggle {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #4a4e69;
            color: #fff;
            border: none;
            padding: 8px 15px;
            font-size: 12px;
            cursor: pointer;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            z-index: 100;
        }
        #debugToggle:hover {
            background: #ff6b6b;
        }
        .level-buttons {
            margin-bottom: 15px;
        }
        .level-btn {
            background: #4a4e69;
            color: #fff;
            border: none;
            padding: 10px 20px;
            margin: 0 5px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.2s;
            font-family: 'Courier New', monospace;
        }
        .level-btn:hover {
            background: #9a8c98;
        }
        .level-btn.active {
            background: #e63946;
        }
        canvas {
            border: 4px solid #4a4e69;
            border-radius: 4px;
            background: linear-gradient(to bottom, #87ceeb, #e0f7fa);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .controls {
            margin-top: 20px;
            color: #f2e9e4;
            font-size: 14px;
        }
        .controls span {
            background: #22223b;
            padding: 4px 8px;
            border-radius: 4px;
            margin: 0 4px;
        }
        #eventLog {
            display: none;
            margin-top: 15px;
            padding: 10px;
            background: #22223b;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            border-radius: 4px;
            min-height: 100px;
        }
        #eventLog div {
            margin: 2px 0;
        }
        .touch-controls {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 0 20px;
            justify-content: space-between;
            pointer-events: none;
            z-index: 1000;
        }
        @media (hover: none) and (pointer: coarse) {
            .touch-controls {
                display: flex;
            }
            .controls {
                display: none;
            }
        }
        .touch-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            border: 3px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }
        .touch-btn:active, .touch-btn.active {
            background: rgba(255, 255, 255, 0.5);
            transform: scale(0.95);
        }
        .touch-btn-group {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }
        .touch-btn.jump {
            width: 80px;
            height: 80px;
            background: rgba(230, 57, 70, 0.35);
            border-color: rgba(230, 57, 70, 0.6);
        }
        .touch-btn.shoot {
            background: rgba(255, 170, 0, 0.35);
            border-color: rgba(255, 170, 0, 0.6);
        }
        .touch-btn.shoot-up {
            background: rgba(0, 255, 255, 0.35);
            border-color: rgba(0, 255, 255, 0.6);
        }
        .touch-btn.shoot-down {
            background: rgba(0, 255, 255, 0.35);
            border-color: rgba(0, 255, 255, 0.6);
        }
    </style>
</head>
<body>
    <button id="debugToggle" onclick="toggleDebug()">Villuleit: SLÖKKT</button>
    <div class="game-container">
        <div class="level-buttons">
            <button class="level-btn active" id="level1" onclick="selectLevel(1); this.blur()">Borð 1</button>
            <button class="level-btn" id="level2" onclick="selectLevel(2); this.blur()">Borð 2</button>
            <button class="level-btn" id="level3" onclick="selectLevel(3); this.blur()">Borð 3</button>
            <button class="level-btn" id="level4" onclick="selectLevel(4); this.blur()">Borð 4</button>
            <button class="level-btn" id="level5" onclick="selectLevel(5); this.blur()">Borð 5</button>
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="eventLog"></div>
        <div class="touch-controls">
            <div class="touch-btn-group">
                <div class="touch-btn" id="touchLeft">◀</div>
                <div class="touch-btn" id="touchRight">▶</div>
            </div>
            <div class="touch-btn-group">
                <div class="touch-btn shoot-up" id="touchShootUp">▲</div>
                <div class="touch-btn" id="touchJump">●</div>
                <div class="touch-btn shoot" id="touchShoot">▶</div>
                <div class="touch-btn shoot-down" id="touchShootDown">▼</div>
            </div>
        </div>
        <div class="controls">
            <p>Stjórnun: <span>A</span> <span>D</span> til að hreyfa &nbsp;|&nbsp; <span>W</span> eða <span>Space</span> til að hoppa &nbsp;|&nbsp; <span>Örvar</span> til að skjóta</p>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
